version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=medoed
      - POSTGRES_PASSWORD=medoed_secret
      - POSTGRES_DB=medoed
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/backend/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - medoed-net

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=medoed
      - DB_PASSWORD=medoed_secret
      - DB_NAME=medoed
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - medoed-net
    volumes:
      - ./src/backend/config.json:/app/config.json:ro

  agent:
    build: 
      context: ./src/agent
      dockerfile: Dockerfile
    network_mode: host
    privileged: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - ./src/agent/config.json:/etc/medoed/agent.json:ro
    environment:
      - AGENT_CONFIG_PATH=/etc/medoed/agent.json
    restart: unless-stopped

networks:
  medoed-net:
    driver: bridge